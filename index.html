<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>円皮鍼セルフケアガイド</title>
<style>
  :root {
    --primary: #2a7a5a;
    --primary-light: #e8f5ef;
    --primary-dark: #1d5a42;
    --accent: #e8703a;
    --accent-light: #fdf0e8;
    --bg: #f9faf8;
    --card: #ffffff;
    --text: #2c3e30;
    --text-muted: #6b7c70;
    --border: #d4e6d9;
    --type-bg: #ff8c42;
    --check-bg: #f97316;
    --honchi-bg: #2d8653;
    --shadow: 0 2px 12px rgba(42,122,90,0.08);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'ヒラギノ角ゴ ProN', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ヘッダー */
  .header {
    background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
    color: white;
    padding: 20px 16px 16px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .header-icon { font-size: 28px; margin-bottom: 4px; }
  .header h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.05em; }
  .header p { font-size: 11px; opacity: 0.85; margin-top: 2px; }

  /* ステップナビ */
  .step-nav {
    display: flex;
    background: white;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    padding: 8px 12px;
    gap: 4px;
  }
  .step-item {
    flex: 1;
    min-width: 60px;
    text-align: center;
    padding: 6px 4px;
    border-radius: 8px;
    font-size: 11px;
    color: var(--text-muted);
    cursor: default;
    transition: all 0.2s;
  }
  .step-item.active {
    background: var(--primary-light);
    color: var(--primary-dark);
    font-weight: 700;
  }
  .step-item.done {
    color: var(--primary);
    font-weight: 600;
  }
  .step-num {
    display: block;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--border);
    color: var(--text-muted);
    font-size: 11px;
    font-weight: 700;
    line-height: 22px;
    margin: 0 auto 2px;
  }
  .step-item.active .step-num {
    background: var(--primary);
    color: white;
  }
  .step-item.done .step-num {
    background: var(--primary-light);
    color: var(--primary);
  }

  /* メインコンテンツ */
  .main { padding: 16px; max-width: 600px; margin: 0 auto; }

  /* セクションタイトル */
  .section-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }
  .section-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 14px;
  }

  /* 症状グリッド */
  .symptom-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .symptom-card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 12px;
    cursor: pointer;
    transition: all 0.18s;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .symptom-card:active, .symptom-card:hover {
    border-color: var(--primary);
    background: var(--primary-light);
    transform: translateY(-1px);
    box-shadow: var(--shadow);
  }
  .symptom-card.selected {
    border-color: var(--primary);
    background: var(--primary-light);
  }
  .symptom-emoji { font-size: 26px; flex-shrink: 0; }
  .symptom-info { flex: 1; min-width: 0; }
  .symptom-name { font-size: 14px; font-weight: 700; color: var(--text); }
  .symptom-desc { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

  /* 体質チェック */
  .constitution-card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    margin-bottom: 10px;
    overflow: hidden;
  }
  .constitution-label {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .constitution-label:active { background: var(--primary-light); }
  .constitution-checkbox {
    width: 20px;
    height: 20px;
    border-radius: 6px;
    border: 2px solid var(--border);
    background: white;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .constitution-label.checked .constitution-checkbox {
    background: var(--primary);
    border-color: var(--primary);
  }
  .constitution-label.checked .constitution-checkbox::after {
    content: '✓';
    color: white;
    font-size: 12px;
    font-weight: 700;
  }
  .constitution-text { font-size: 13px; color: var(--text); line-height: 1.5; }
  .constitution-subgroup {
    font-size: 11px;
    color: var(--primary);
    font-weight: 600;
    display: block;
    margin-bottom: 2px;
  }

  /* ツボ表示 */
  .tsubo-section {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 14px;
    margin-bottom: 12px;
  }
  .tsubo-section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--primary-dark);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tsubo-section-title::before {
    content: '';
    display: block;
    width: 4px;
    height: 16px;
    background: var(--primary);
    border-radius: 2px;
  }

  .tokukoketsu-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 4px;
  }
  .tsubo-tag {
    background: var(--primary-light);
    color: var(--primary-dark);
    border: 1px solid var(--primary);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .tsubo-tag input[type="checkbox"] { display: none; }
  .tsubo-tag.checkable {
    cursor: pointer;
    transition: all 0.15s;
  }
  .tsubo-tag.checkable:active, .tsubo-tag.checkable:hover {
    background: var(--primary);
    color: white;
  }
  .tsubo-tag.checked-tag {
    background: var(--primary);
    color: white;
    border-color: var(--primary-dark);
  }

  /* 体質ごとのツボカード */
  .result-constitution-card {
    background: var(--primary-light);
    border: 1px solid var(--primary);
    border-radius: var(--radius);
    padding: 12px;
    margin-bottom: 10px;
  }
  .result-type-badge {
    display: inline-block;
    background: var(--type-bg);
    color: white;
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .result-tsubo-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
  }
  .honchi-tag {
    background: white;
    border: 1.5px solid var(--primary);
    color: var(--primary-dark);
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 12px;
    font-weight: 600;
  }
  .honchi-tag.checkable {
    cursor: pointer;
    transition: all 0.15s;
  }
  .honchi-tag.checkable:active { background: var(--primary); color: white; }
  .honchi-tag.checked-tag { background: var(--primary); color: white; }
  .arrow-label { font-size: 11px; color: var(--text-muted); align-self: center; }

  /* 注意書き */
  .note-box {
    background: #fffbf0;
    border: 1px solid #f0d070;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 12px;
    color: #7a6020;
    margin-bottom: 14px;
    line-height: 1.6;
  }
  .note-box::before { content: '⚠️ '; }

  /* 印刷ボタン */
  .print-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: white;
    border: 2px solid var(--primary);
    color: var(--primary);
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    width: 100%;
    margin-bottom: 10px;
  }
  .print-btn:active { background: var(--primary-light); }

  /* ナビゲーションボタン */
  .btn-row { display: flex; gap: 10px; margin-top: 16px; }
  .btn {
    flex: 1;
    padding: 13px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    text-align: center;
  }
  .btn-primary {
    background: var(--primary);
    color: white;
  }
  .btn-primary:active { background: var(--primary-dark); transform: scale(0.98); }
  .btn-primary:disabled { background: var(--border); color: var(--text-muted); }
  .btn-secondary {
    background: white;
    color: var(--primary);
    border: 2px solid var(--primary);
  }
  .btn-secondary:active { background: var(--primary-light); }

  /* 貼り方ガイド */
  .howto-step {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 14px;
    margin-bottom: 10px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .howto-num {
    background: var(--primary);
    color: white;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .howto-text { flex: 1; }
  .howto-title { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
  .howto-desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

  /* 安全警告 */
  .safety-box {
    background: #f0f9f4;
    border: 1px solid var(--primary);
    border-radius: 8px;
    padding: 12px;
    font-size: 12px;
    color: var(--primary-dark);
    margin-top: 12px;
    line-height: 1.7;
  }
  .safety-box::before { content: '⚕️ '; font-size: 14px; }

  /* 選択数バッジ */
  .selected-count {
    background: var(--primary);
    color: white;
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 13px;
    font-weight: 700;
    display: inline-block;
    margin-bottom: 12px;
  }

  /* 症状ヘッダー（結果画面） */
  .symptom-header {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: white;
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .symptom-header-emoji { font-size: 32px; }
  .symptom-header-name { font-size: 18px; font-weight: 700; }
  .symptom-header-desc { font-size: 12px; opacity: 0.85; margin-top: 2px; }

  @media print {
    .header, .step-nav, .btn-row, .print-btn { display: none !important; }
    .main { padding: 0; }
  }

  /* フェードイン */
  .fade-in { animation: fadeIn 0.25s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* ツボアコーディオン */
  .tsubo-item {
    margin-bottom: 8px;
  }
  .tsubo-tag-btn {
    background: var(--primary-light);
    color: var(--primary-dark);
    border: 1.5px solid var(--primary);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
    user-select: none;
  }
  .tsubo-tag-btn:active { background: var(--primary); color: white; }
  .tsubo-tag-btn.open {
    background: var(--primary);
    color: white;
    border-radius: 16px 16px 4px 4px;
  }
  .tsubo-tag-btn.checked-tag {
    background: var(--primary-dark);
    color: white;
    border-color: var(--primary-dark);
  }
  .tsubo-tag-btn .tag-arrow {
    font-size: 10px;
    transition: transform 0.2s;
  }
  .tsubo-tag-btn.open .tag-arrow { transform: rotate(180deg); }

  .tsubo-detail {
    display: none;
    background: white;
    border: 1.5px solid var(--primary);
    border-top: none;
    border-radius: 0 0 12px 12px;
    padding: 10px 12px 12px;
    margin-top: -2px;
  }
  .tsubo-detail.open { display: block; animation: fadeIn 0.18s ease-out; }
  .tsubo-who {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .tsubo-img {
    width: 100%;
    max-width: 220px;
    border-radius: 8px;
    border: 1px solid var(--border);
    display: block;
    margin: 0 auto 8px;
  }
  .tsubo-location-text {
    font-size: 12px;
    color: var(--text);
    line-height: 1.7;
  }
  .tsubo-check-btn {
    margin-top: 10px;
    width: 100%;
    padding: 8px;
    border-radius: 8px;
    border: 1.5px solid var(--primary);
    background: white;
    color: var(--primary);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tsubo-check-btn.checked {
    background: var(--primary);
    color: white;
  }
  .tsubo-check-btn:active { opacity: 0.8; }

  /* honchi-tag も同様のアコーディオン対応 */
  .honchi-tag-btn {
    background: white;
    border: 1.5px solid var(--primary);
    color: var(--primary-dark);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    transition: all 0.15s;
  }
  .honchi-tag-btn.open {
    background: var(--primary-light);
    border-radius: 12px 12px 3px 3px;
  }
  .honchi-tag-btn.checked-tag {
    background: var(--primary-dark);
    color: white;
    border-color: var(--primary-dark);
  }
  .honchi-tag-btn .tag-arrow { font-size: 10px; transition: transform 0.2s; }
  .honchi-tag-btn.open .tag-arrow { transform: rotate(180deg); }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🪡</div>
  <h1>円皮鍼セルフケアガイド</h1>
  <p>症状から探す・ツボの位置・貼り方まで</p>
</div>

<div class="step-nav" id="stepNav">
  <div class="step-item active" id="step1nav">
    <span class="step-num">1</span>症状
  </div>
  <div class="step-item" id="step2nav">
    <span class="step-num">2</span>体質
  </div>
  <div class="step-item" id="step3nav">
    <span class="step-num">3</span>ツボ
  </div>
  <div class="step-item" id="step4nav">
    <span class="step-num">4</span>貼り方
  </div>
</div>

<div class="main" id="mainContent"></div>

<script>
// ===================== データ =====================
const symptoms = [
  {
    id: "headache", emoji: "🤕", name: "頭痛", description: "頭が痛い・重い",
    note: "日常生活に支障のない程度の弱い痛みや繰り返す頭痛に効果があります。急に痛み始めたり強くなる場合は速やかに医療機関を受診しましょう。",
    tokukoketsu: ["頭維","通天","率谷","風池","神庭","四神聡","太陽"],
    types: [
      { check: "からだが重だるい、重い痛み、湿度が高いと具合が悪い、舌苔が厚い", type:"痰湿タイプ", h1:"豊隆", h2:"足三里" },
      { check: "拍動性の痛み、からだがほてる、顔が赤っぽい、舌の赤みが強い、脈が速い", type:"実熱タイプ", h1:"内庭", h2:"合谷" },
      { check: "張った痛み、イライラする、怒りっぽい・憂うつ、胸脇苦満", type:"気滞タイプ", h1:"太衝", h2:"間使" },
      { check: "刺すような痛み、舌の赤みが暗紅色", type:"血瘀タイプ", h1:"三陰交", h2:"血海" },
      { check: "【鈍痛】疲れやすい、倦怠感、息切れ、舌に歯形がつく、脈が弱い", type:"気虚タイプ", h1:"足三里", h2:"百会" },
      { check: "【鈍痛】めまいが起こりやすい、爪の赤みが薄い、脈が細い", type:"血虚タイプ", h1:"三陰交", h2:"血海" },
      { check: "【鈍痛】夜になると手足がほてる、寝汗をかきやすい、舌のひび割れ", type:"陰虚タイプ", h1:"復溜", h2:"三陰交" },
      { check: "【鈍痛】頭の空洞感、耳鳴りがする、足腰がだるい、物忘れが気になる", type:"精虚タイプ", h1:"太渓", h2:"三陰交" }
    ]
  },
  {
    id: "stiff_shoulder", emoji: "💪", name: "肩こり", description: "首・肩の張り",
    note: "肩こりのほかにも症状がある場合は、筋肉の疲労以外の原因が考えられます。多くは熱や気、血がこもっている状態です。",
    tokukoketsu: ["肩井","天髎","大椎","至陽","後渓"],
    types: [
      { check: "【イライラ】めまい、血圧が高い、からだがほてる、顔が赤っぽい、舌の赤みが強い、脈が速い", type:"実熱タイプ", h1:"太衝", h2:"曲池" },
      { check: "【イライラ】怒りっぽい、憂うつ、胸脇苦満、よくため息をつく、舌の赤みが暗紅色、爪の色が青紫っぽい", type:"気滞＋血瘀タイプ", h1:"間使", h2:"三陰交" },
      { check: "ドライアイ、眼精疲労、めまい、動悸、足がつりやすい、爪の赤みが薄い、脈が細い", type:"血虚タイプ", h1:"三陰交", h2:"太衝" }
    ]
  },
  {
    id: "insomnia", emoji: "😴", name: "不眠", description: "眠れない・浅い",
    note: "なかなか眠りにつけない、すぐに目が覚める、何度も目覚めるなどのパターンがあります。強い緊張や不安が原因で眠れないときは心身がリラックスするツボを刺激します。",
    tokukoketsu: ["神門","心兪","神庭"],
    types: [
      { check: "眠りが浅い、よく目が覚める、めまい、胃のつかえ感、舌苔が厚い", type:"痰湿タイプ", h1:"豊隆", h2:"陰陵泉" },
      { check: "【入眠困難】怒りっぽい、イライラする、顔が赤っぽい、胸脇苦満、舌がとても赤い、脈が速い", type:"実熱タイプ", h1:"太衝", h2:"内庭" },
      { check: "【入眠困難】疲れがとれない、おどおどしやすい、息切れ、舌に歯形がつく、脈が弱い", type:"気虚タイプ", h1:"足三里", h2:"胆兪" },
      { check: "【入眠困難】顔色がさえない、舌の赤みが薄い、脈が細い", type:"血虚タイプ", h1:"三陰交", h2:"血海" },
      { check: "少し眠ると目が覚める、夜になると手足がほてる、寝汗をかきやすい、舌のひび割れ", type:"陰虚タイプ", h1:"照海", h2:"腎兪" }
    ]
  },
  {
    id: "drowsiness", emoji: "💤", name: "眠けが強い", description: "日中の強い眠気",
    note: "夜間に睡眠を十分にとっていても、日中に眠くなったり、油断をすると眠ってしまうのは、気や陽の不足なども考えられます。夜間の睡眠の状態を見直すことも大切です。",
    tokukoketsu: ["四神聡","神庭","印堂","神門"],
    types: [
      { check: "からだが重だるい、食欲不振、便がゆるい、舌苔が厚い", type:"痰湿タイプ", h1:"陰陵泉", h2:"豊隆" },
      { check: "食後に眠くなる、倦怠感、息切れ、精神疲労、舌に歯形がつく、脈が弱い", type:"気虚タイプ", h1:"気海", h2:"足三里" },
      { check: "よくうとうとする、足腰が弱い、寒がり、手足の冷え、舌の赤みが薄い", type:"陽虚タイプ", h1:"関元", h2:"太渓" }
    ]

// ===================== ツボアイテム生成ヘルパー =====================
// tsuboName: "合谷" など。複合名（"合谷＋太衝"）は個別に分割して表示
// checkKey: checkedTsuboのキー文字列
// styleType: 'primary'（特効穴）or 'honchi'（本治穴）
function makeTsuboItems(container, tsuboNames, checkKeyPrefix, styleType) {
  // ＋区切りの複合名を分割
  const names = tsuboNames.split(/[＋+・]/).map(n => n.trim()).filter(Boolean);

  names.forEach((name, idx) => {
    const info = tsuboInfo[name];
    const checkKey = checkKeyPrefix + '_' + idx;
    const wrapper = document.createElement('div');
    wrapper.className = 'tsubo-item';

    const btn = document.createElement('button');
    btn.className = styleType === 'honchi' ? 'honchi-tag-btn' : 'tsubo-tag-btn';
    if (checkedTsubo.has(checkKey)) btn.classList.add('checked-tag');

    btn.innerHTML = `${name} <span class="tag-arrow">▼</span>`;

    const detail = document.createElement('div');
    detail.className = 'tsubo-detail';

    if (info) {
      // 画像（images/WHO_CODE.png）
      const imgPath = `images/${info.who}.png`;
      const imgHtml = `<img class="tsubo-img" src="${imgPath}" alt="${name}" onerror="this.style.display='none'">`;
      detail.innerHTML = `
        <div class="tsubo-who">WHO: ${info.who}</div>
        ${imgHtml}
        <div class="tsubo-location-text">📍 ${info.loc}</div>
        <button class="tsubo-check-btn${checkedTsubo.has(checkKey) ? ' checked' : ''}" data-key="${checkKey}">
          ${checkedTsubo.has(checkKey) ? '✓ 今日貼る（選択済み）' : '＋ 今日貼るツボに追加'}
        </button>
      `;
    } else {
      detail.innerHTML = `
        <div class="tsubo-location-text">取穴の詳細情報は準備中です。</div>
        <button class="tsubo-check-btn${checkedTsubo.has(checkKey) ? ' checked' : ''}" data-key="${checkKey}">
          ${checkedTsubo.has(checkKey) ? '✓ 今日貼る（選択済み）' : '＋ 今日貼るツボに追加'}
        </button>
      `;
    }

    // タップで展開
    btn.onclick = (e) => {
      const isOpen = detail.classList.contains('open');
      // 同一セクション内の他を閉じる（任意）
      detail.classList.toggle('open', !isOpen);
      btn.classList.toggle('open', !isOpen);
    };

    // チェックボタン
    detail.querySelector('.tsubo-check-btn').onclick = (e) => {
      const key = e.target.dataset.key;
      if (checkedTsubo.has(key)) {
        checkedTsubo.delete(key);
        e.target.classList.remove('checked');
        e.target.textContent = '＋ 今日貼るツボに追加';
        btn.classList.remove('checked-tag');
      } else {
        checkedTsubo.add(key);
        e.target.classList.add('checked');
        e.target.textContent = '✓ 今日貼る（選択済み）';
        btn.classList.add('checked-tag');
      }
      updateCount();
    };

    wrapper.appendChild(btn);
    wrapper.appendChild(detail);
    container.appendChild(wrapper);
  });
}

// ===================== 状態 =====================
let currentStep = 1;
let selectedSymptom = null;
let selectedTypes = new Set();
let checkedTsubo = new Set();

// ===================== レンダリング =====================
function render() {
  updateStepNav();
  const main = document.getElementById('mainContent');
  main.innerHTML = '';
  main.className = 'main fade-in';

  if (currentStep === 1) renderStep1(main);
  else if (currentStep === 2) renderStep2(main);
  else if (currentStep === 3) renderStep3(main);
  else if (currentStep === 4) renderStep4(main);

  window.scrollTo(0, 0);
}

function updateStepNav() {
  for (let i = 1; i <= 4; i++) {
    const el = document.getElementById(`step${i}nav`);
    el.className = 'step-item';
    if (i === currentStep) el.className += ' active';
    else if (i < currentStep) el.className += ' done';
  }
}

// ---- ステップ1: 症状選択 ----
function renderStep1(main) {
  main.innerHTML = `
    <p class="section-title">気になる症状を選んでください</p>
    <p class="section-sub">今いちばんつらい症状を選んでください。当てはまるものを1つ選んでください。</p>
    <div class="symptom-grid" id="symptomGrid"></div>
    <div class="btn-row">
      <button class="btn btn-primary" id="toStep2Btn" disabled onclick="goToStep2()">次へ：体質チェック →</button>
    </div>
    <div class="safety-box">円皮鍼は補助的なセルフケアです。強い痛みや長く続く症状は必ず医師にご相談ください。</div>
  `;
  const grid = document.getElementById('symptomGrid');
  symptoms.forEach(s => {
    const card = document.createElement('div');
    card.className = 'symptom-card' + (selectedSymptom?.id === s.id ? ' selected' : '');
    card.innerHTML = `<span class="symptom-emoji">${s.emoji}</span><div class="symptom-info"><div class="symptom-name">${s.name}</div><div class="symptom-desc">${s.description}</div></div>`;
    card.onclick = () => {
      selectedSymptom = s;
      selectedTypes.clear();
      checkedTsubo.clear();
      document.querySelectorAll('.symptom-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      document.getElementById('toStep2Btn').disabled = false;
    };
    grid.appendChild(card);
  });
}

function goToStep2() {
  if (!selectedSymptom) return;
  currentStep = 2;
  render();
}

// ---- ステップ2: 体質チェック ----
function renderStep2(main) {
  const s = selectedSymptom;
  let html = `
    <div class="symptom-header">
      <span class="symptom-header-emoji">${s.emoji}</span>
      <div>
        <div class="symptom-header-name">${s.name}</div>
        <div class="symptom-header-desc">${s.description}</div>
      </div>
    </div>
    <p class="section-title">体質チェック</p>
    <p class="section-sub">当てはまるものをすべて選んでください。より自分に近いものを選ぶと、ぴったりのツボが見つかります。</p>
    <div id="constitutionList"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="goBack()">← 症状を選び直す</button>
      <button class="btn btn-primary" onclick="goToStep3()">ツボを見つける →</button>
    </div>
  `;
  main.innerHTML = html;

  const list = document.getElementById('constitutionList');
  s.types.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = 'constitution-card';
    const isChecked = selectedTypes.has(i);
    const label = document.createElement('div');
    label.className = 'constitution-label' + (isChecked ? ' checked' : '');
    label.innerHTML = `
      <div class="constitution-checkbox"></div>
      <div class="constitution-text">${t.check}</div>
    `;
    label.onclick = () => {
      if (selectedTypes.has(i)) {
        selectedTypes.delete(i);
        label.classList.remove('checked');
      } else {
        selectedTypes.add(i);
        label.classList.add('checked');
      }
    };
    card.appendChild(label);
    list.appendChild(card);
  });
}

function goToStep3() {
  currentStep = 3;
  render();
}

// ---- ステップ3: ツボ表示 ----
function renderStep3(main) {
  const s = selectedSymptom;
  const selectedTypeList = s.types.filter((_, i) => selectedTypes.has(i));

  let html = `
    <div class="symptom-header">
      <span class="symptom-header-emoji">${s.emoji}</span>
      <div>
        <div class="symptom-header-name">${s.name}</div>

    <div class="note-box">${s.note}</div>
    <p class="section-title">✦ あなたへのおすすめツボ</p>

    <div id="selectedCountBadge" class="selected-count">0か所 選択中</div>

  // 特効穴

    makeTsuboItems(tList, t, 't_' + idx, 'primary');
  });

  main.appendChild(tSection);

  // 体質ごとのツボ
  if (selectedTypeList.length > 0) {
    const hSection = document.createElement('div');
    hSection.className = 'tsubo-section';
    hSection.innerHTML = `<div class="tsubo-section-title">本治穴（体質に合わせたツボ）</div>`;
    selectedTypeList.forEach((t, ti) => {
      const card = document.createElement('div');
      card.className = 'result-constitution-card';
      card.innerHTML = `<div class="result-type-badge">${t.type}</div>`;

      const row1 = document.createElement('div');
      row1.className = 'result-tsubo-row';
      row1.innerHTML = '<span class="arrow-label" style="font-size:11px;color:var(--text-muted);display:block;margin-bottom:4px;">本治穴①</span>';
      makeTsuboItems(row1, t.h1, `h1_${ti}`, 'honchi');

      const arrow = document.createElement('div');
      arrow.className = 'arrow-label';
      arrow.style.cssText = 'font-size:11px;color:var(--text-muted);margin:6px 0 4px;';
      arrow.textContent = '↓ 効果が弱い場合は本治穴②も';

      const row2 = document.createElement('div');
      row2.className = 'result-tsubo-row';
      makeTsuboItems(row2, t.h2, `h2_${ti}`, 'honchi');

      card.appendChild(row1);
      card.appendChild(arrow);

    });

    const hint = document.createElement('div');

    main.appendChild(hint);
  }

  const btnRow = document.createElement('div');
  btnRow.className = 'btn-row';
  btnRow.innerHTML = `
    <button class="btn btn-secondary" onclick="currentStep=2;render()">← 体質チェックに戻る</button>
    <button class="btn btn-primary" onclick="currentStep=4;render()">円皮鍼の貼り方を確認する →</button>
  `;
  main.appendChild(btnRow);

  updateCount();
}

function updateCount() {
  const badge = document.getElementById('selectedCountBadge');
  if (badge) badge.textContent = `${checkedTsubo.size}か所 選択中`;
}
